<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tempsens | Thermocouple Configurator</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <style>
        body, html, #root { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #F3F4F6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const THREE = window.THREE;

        const CAT = {
          tcTypes: [
            { code:"K", name:"Chromel / Alumel", col:0xE07030 },
            { code:"J", name:"Iron / Constantan", col:0x4477EE },
            { code:"N", name:"Nicrosil / Nisil", col:0xEEAA00 },
            { code:"T", name:"Copper / Constantan", col:0xCC7733 },
            { code:"R", name:"Pt-13%Rh / Pure Pt", col:0xDDDDD0 },
            { code:"S", name:"Pt-10%Rh / Pure Pt", col:0xE0E0D8 },
            { code:"B", name:"Pt-30%Rh / Pt-6%Rh", col:0xEEDDBB }
          ],
          elements:[{code:"S",label:"Simplex"},{code:"D",label:"Duplex"}],
          junctions:[{code:"GN",name:"Grounded"},{code:"UN",name:"Ungrounded"},{code:"EX",name:"Exposed"}],
          sheaths:[{code:"316",name:"SS 316"},{code:"310",name:"SS 310"},{code:"600",name:"Inconel-600"}],
          diameters:[1, 1.5, 3, 4.5, 6, 8],
          connections:[{code:"NPT",name:"NPT Thread"},{code:"BSP",name:"BSP Thread"},{code:"F150",name:"ANSI Flange #150"}],
          heads:[{code:"C",name:"Standard Head"},{code:"EB",name:"Ex-Proof Head"},{code:"None",name:"No Head"}],
          thermowells:[{code:"None",name:"No Thermowell"},{code:"Straight",name:"Straight"},{code:"Tapered",name:"Tapered"}]
        };

        const LS = {
            lbl: { fontSize: "10px", fontWeight: "800", color: "#64748B", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: "4px", display: "block" },
            sel: { width: "100%", padding: "8px", borderRadius: "4px", border: "1px solid #D1D5DB", fontSize: "12px", marginBottom: "12px", background: "#fff" }
        };

        function App() {
            const [cfg, setCfg] = useState({
                tcType: "K", element: "S", junction: "UN", sheath: "316",
                diameter: 6, connection: "NPT", head: "C", thermowell: "None"
            });

            const update = (k, v) => setCfg(p => ({ ...p, [k]: v }));

            return (
                <div style={{ display: "flex", height: "100vh" }}>
                    {/* SIDEBAR */}
                    <div style={{ width: "300px", background: "#FFFFFF", borderRight: "1px solid #E5E7EB", display: "flex", flexDirection: "column" }}>
                        <div style={{ background: "#2D2D2D", padding: "20px", borderBottom: "4px solid #ffa600" }}>
                            <div style={{ color: "#ffa600", fontWeight: "900", fontSize: "18px", letterSpacing: "1px" }}>TEMPSENS</div>
                            <div style={{ color: "#FFFFFF", fontSize: "10px", opacity: 0.8 }}>THERMAL SOLUTIONS CONFIGURATOR</div>
                        </div>
                        
                        <div style={{ padding: "20px", overflowY: "auto", flex: 1 }}>
                            <label style={LS.lbl}>Thermocouple Type</label>
                            <select style={LS.sel} value={cfg.tcType} onChange={e => update("tcType", e.target.value)}>
                                {CAT.tcTypes.map(t => <option key={t.code} value={t.code}>Type {t.code}</option>)}
                            </select>

                            <label style={LS.lbl}>Element Type</label>
                            <select style={LS.sel} value={cfg.element} onChange={e => update("element", e.target.value)}>
                                {CAT.elements.map(t => <option key={t.code} value={t.code}>{t.label}</option>)}
                            </select>

                            <label style={LS.lbl}>Junction</label>
                            <select style={LS.sel} value={cfg.junction} onChange={e => update("junction", e.target.value)}>
                                {CAT.junctions.map(t => <option key={t.code} value={t.code}>{t.name}</option>)}
                            </select>

                            <label style={LS.lbl}>Sheath Material</label>
                            <select style={LS.sel} value={cfg.sheath} onChange={e => update("sheath", e.target.value)}>
                                {CAT.sheaths.map(t => <option key={t.code} value={t.code}>{t.name}</option>)}
                            </select>

                            <label style={LS.lbl}>Diameter (mm)</label>
                            <select style={LS.sel} value={cfg.diameter} onChange={e => update("diameter", e.target.value)}>
                                {CAT.diameters.map(d => <option key={d} value={d}>{d} mm</option>)}
                            </select>

                            <label style={LS.lbl}>Process Connection</label>
                            <select style={LS.sel} value={cfg.connection} onChange={e => update("connection", e.target.value)}>
                                {CAT.connections.map(t => <option key={t.code} value={t.code}>{t.name}</option>)}
                            </select>

                            <label style={LS.lbl}>Terminal Head</label>
                            <select style={LS.sel} value={cfg.head} onChange={e => update("head", e.target.value)}>
                                {CAT.heads.map(t => <option key={t.code} value={t.code}>{t.name}</option>)}
                            </select>

                            <label style={LS.lbl}>Thermowell</label>
                            <select style={LS.sel} value={cfg.thermowell} onChange={e => update("thermowell", e.target.value)}>
                                {CAT.thermowells.map(t => <option key={t.code} value={t.code}>{t.name}</option>)}
                            </select>
                        </div>
                    </div>

                    {/* MAIN VIEW */}
                    <div style={{ flex: 1, position: "relative", display: "flex", flexDirection: "column" }}>
                        <div style={{ padding: "15px 30px", background: "#fff", borderBottom: "1px solid #E5E7EB", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                            <div>
                                <span style={{ color: "#64748B", fontSize: "12px" }}>MODEL IDENTIFIER</span>
                                <div style={{ fontSize: "20px", fontWeight: "800", color: "#1F2937" }}>T-101-{cfg.tcType}-{cfg.diameter}-{cfg.element}</div>
                            </div>
                            <button style={{ background: "#ffa600", color: "#fff", border: "none", padding: "10px 20px", borderRadius: "4px", fontWeight: "bold", cursor: "pointer" }}>
                                EXPORT DATASHEET
                            </button>
                        </div>
                        <div id="canvas-container" style={{ flex: 1, background: "#F9FAFB" }}>
                            <Viewer3D cfg={cfg} />
                        </div>
                    </div>
                </div>
            );
        }

        function Viewer3D({ cfg }) {
            const mountRef = useRef(null);
            useEffect(() => {
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0xF9FAFB);
                const camera = new THREE.PerspectiveCamera(45, mountRef.current.clientWidth / mountRef.current.clientHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(mountRef.current.clientWidth, mountRef.current.clientHeight);
                mountRef.current.appendChild(renderer.domElement);

                const light = new THREE.DirectionalLight(0xffffff, 1);
                light.position.set(5, 5, 5);
                scene.add(light);
                scene.add(new THREE.AmbientLight(0xffffff, 0.5));

                const group = new THREE.Group();
                scene.add(group);

                // Simple Cylinder representing the TC
                const material = new THREE.MeshStandardMaterial({ color: 0x94A3B8, metalness: 0.8, roughness: 0.2 });
                const sheath = new THREE.Mesh(new THREE.CylinderGeometry(cfg.diameter/20, cfg.diameter/20, 10, 32), material);
                group.add(sheath);

                if (cfg.head !== "None") {
                    const head = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshStandardMaterial({ color: 0x475569 }));
                    head.position.y = 5.5;
                    group.add(head);
                }

                camera.position.z = 15;

                const animate = () => {
                    requestAnimationFrame(animate);
                    group.rotation.y += 0.01;
                    renderer.render(scene, camera);
                };
                animate();

                return () => { mountRef.current.removeChild(renderer.domElement); };
            }, [cfg]);

            return <div ref={mountRef} style={{ width: "100%", height: "100%" }} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
