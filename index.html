        function deriveModel(c){

          return"T-101";

          if(c.connection==="WeldPad")I.push("Weld Pad: specify pipe OD — underside radius must match.");
          if(c.thermowell!=="None"&&twm&&sh&&twm.maxT<sh.maxT)W.push(`TW material max ${twm.maxT}°C lower than sheath max ${sh.maxT}°C.`);

          const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>${mc} Tempsens Datasheet</title><style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',Arial,sans-serif;color:#2d3748;background:#fff;font-size:13px;line-height:1.5}.page{max-width:900px;margin:0 auto;padding:32px}h2{font-size:11px;font-weight:800;color:#1E3A7A;text-transform:uppercase;letter-spacing:.16em;margin:26px 0 10px;padding-bottom:5px;border-bottom:2.5px solid #1E3A7A}table{width:100%;border-collapse:collapse}th{background:#1E3A7A;color:#fff;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:7px 11px;border:1px solid #163060;text-align:left}td{padding:7px 11px;border:1px solid #e2e8f0;vertical-align:top;font-size:12px}tr:nth-child(even) td{background:#f7fafc}.lbl{width:210px;background:#f7fafc!important;font-weight:600;color:#4a5568}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}.np{display:none}@page{margin:18mm}}</style></head><body><div class="page"><div style="background:linear-gradient(135deg,#1E3A7A,#2563EB);border-radius:10px;padding:24px 28px;color:#fff;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px"><div><div style="font-size:9px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;opacity:.7;margin-bottom:6px">Tempsens Instruments (I) Pvt. Ltd.</div><div style="font-size:22px;font-weight:800">Thermocouple Assembly</div><div style="font-size:13px;opacity:.8;margin-top:4px">T-Series Product Configuration &amp; Datasheet</div></div><div style="text-align:right"><div style="font-family:monospace;font-size:38px;font-weight:700;color:#FCD34D;line-height:1">${mc}</div><div style="font-size:11px;opacity:.65;margin-top:4px">Generated: ${date}</div></div></div><div class="np" style="background:#fef9c3;border:1.5px solid #fde68a;border-radius:7px;padding:9px 1         /* --- 3D VIEWER COMPONENT --- */
        function Viewer3D({cfg}){
          const mountRef=useRef(null);

            R.cam.position.set(3,4,18);
            R.cam.lookAt(0,0,0);

            R.ren.setSize(W,H);R.ren.setPixelRatio(Math.min(devicePixelRatio,2));

            const md=e=>{R.drag=true;R.mx=e.clientX;R.my=e.clientY;};
            const mu=()=>{R.drag=false;};
            const mm=e=>{if(!R.drag)return;R.rotY+=(e.clientX-R.mx)*0.009;R.rotX+=(e.clientY-R.my)*0.009;R.rotX=Math.max(-0.6,Math.min(0.6,R.rotX));R.mx=e.clientX;R.my=e.clientY;};
            const mw=e=>{R.cam.position.z=Math.max(8,Math.min(30,R.cam.position.z+e.deltaY*0.015));};
            el.addEventListener("mousedown",md);window.addEventListener("mouseup",mu);window.addEventListener("mousemove",mm);el.addEventListener("wheel",mw);
            const loop=()=>{R.frame=requestAnimationFrame(loop);if(!R.drag)R.rotY+=0.002;if(R.grp){R.grp.rotation.y=R.rotY;R.grp.rotation.x=R.rotX;}R.ren.render(R.scene,R.cam);};
            loop();
            const onR=()=>{const W=el.clientWidth,H=el.clientHeight;R.cam.aspect=W/H;R.cam.updateProjectionMatrix();R.ren.setSize(W,H);};
            window.addEventListener("resize",onR);
            return()=>{cancelAnimationFrame(R.frame);el.removeEventListener("mousedown",md);window.removeEventListener("mouseup",mu);window.removeEventListener("mousemove",mm);el.removeEventListener("wheel",mw);window.removeEventListener("resize",onR);R.ren.dispose();if(el.contains(R.ren.domElement))el.removeChild(R.ren.domElement);};
          },[]);

          useEffect(()=>{
            const R=S.current;const g=R.grp;if(!g)return;
            while(g.children.length){const o=g.children[0];o.geometry?.dispose();if(Array.isArray(o.material))o.material.forEach(m=>m.dispose());else o.material?.dispose();g.remove(o);}
            const tcDef=CAT.tcTypes.find(t=>t.code===cfg.tcType),shDef=CAT.sheaths.find(s=>s.code===cfg.sheath),cbDef=CAT.cables.find(c=>c.code===cfg.cable),twDef=CAT.thermowells.find(t=>t.code===cfg.thermowell);
            const mesh=(geo,col,met=0.7,rgh=0.25,emCol=null,emInt=0)=>{
              const mat=new THREE.MeshStandardMaterial({color:col,metalness:met,roughness:rgh,side:THREE.FrontSide});
              if(emCol){mat.emissive=new THREE.Color(emCol);mat.emissiveIntensity=emInt;}
              const m=new THREE.Mesh(geo,mat);m.castShadow=true;m.receiveShadow=true;g.add(m);return m;
            };
            const sR=Math.max(0.095,cfg.diameter/38),sC=shDef?.col??0xCCCCCC,tC=tcDef?.col??0xE07030;
            const sL=9.0;
            const sheath=mesh(new THREE.CylinderGeometry(sR,sR,sL,32),sC,0.88,0.12);sheath.position.y=-sL/2-0.5;
            const hiR=sR*0.95;const hi=mesh(new THREE.CylinderGeometry(hiR,hiR,sL*0.92,8),0xFFFFFF,0.0,0.0);hi.position.y=sheath.position.y;
            const wireL=sL*0.4;const wire=mesh(new THREE.CylinderGeometry(sR*0.3,sR*0.3,wireL,8),tC,0.4,0.55);wire.position.y=-sL-0.5+wireL/2+0.05;
            const tipY=-sL-0.5,tipC=cfg.junction==="EX"?tC:sC;
            const tip=mesh(new THREE.SphereGeometry(sR*1.02,22,22),tipC,0.8,0.15,cfg.junction==="EX"?tC:null,0.3);tip.position.y=tipY;
            if(cfg.junction==="EX"){const glow=mesh(new THREE.SphereGeometry(sR*0.5,12,12),tC,0.1,0.5,tC,0.9);glow.position.y=tipY-sR*1.1;}
            const fitY=-3.8,BRASS=0xB8892A,BRASS2=0xC89A38;
            if(cfg.connection.startsWith("F")){
              const fR=cfg.connection==="F600"?1.65:cfg.connection==="F300"?1.42:1.22;
              const fl=mesh(new THREE.CylinderGeometry(fR,fR,0.38,40),0x909098,0.65,0.3);fl.position.y=fitY;
            } else {
              mesh(new THREE.CylinderGeometry(sR*3.8,sR*3.8,0.55,6),BRASS,0.62,0.32).position.y=fitY+0.62;
              mesh(new THREE.CylinderGeometry(sR*3.2,sR*3.2,0.90,32),BRASS2,0.58,0.38).position.y=fitY;
              mesh(new THREE.CylinderGeometry(sR*3.8,sR*3.8,0.55,6),BRASS,0.62,0.32).position.y=fitY-0.62;
            }
            if(cfg.thermowell!=="None"){
              const twL=3.5,twRroot=sR*3.8,twCol=cfg.twMaterial==="WC"?0x6A6840:0xB0B0BA;
              mesh(new THREE.CylinderGeometry(twRroot,twRroot,twL,30),twCol,0.8,0.2).position.y=tipY-twL/2;
            }
            if(cfg.head!=="None"){
              const SILVER=0xAAAAAE;
              mesh(new THREE.CylinderGeometry(sR*3.0,sR*2.8,0.7,28),SILVER,0.72,0.22).position.y=0.1;
              mesh(new THREE.CylinderGeometry(0.8,0.74,0.85,36),SILVER,0.68,0.28).position.y=0.75;
              mesh(new THREE.SphereGeometry(0.81,36,20,0,Math.PI*2,0,Math.PI/2),SILVER,0.62,0.3).position.y=1.2;
            }
          },[cfg]);
          return(<div ref={mountRef} style={{width:"100%",height:"100%",position:"relative",cursor:"grab"}}></div>);
        }

        /* --- UI COMPONENTS --- */
        const LS={lbl:{fontSize:10,fontWeight:700,color:"#1E3A7A",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4,marginTop:12,display:"block"},sel:{width:"100%",background:"#fff",border:"1.5px solid #CBD5E1",borderRadius:6,padding:"7px 10px",fontSize:12,color:"#1E293B",outline:"none",cursor:"pointer"},inp:{width:"100%",background:"#fff",border:"1.5px solid #CBD5E1",borderRadius:6,padding:"7px 10px",fontSize:12,color:"#1E293B",outline:"none"}};
        function Box({title,icon,children}){return(<div style={{background:"#fff",borderRadius:10,border:"1.5px solid #E2E8F0",marginBottom:10,overflow:"hidden",boxShadow:"0 1px 4px rgba(30,60,130,0.06)"}}><div style={{background:"linear-gradient(90deg,#1E3A7A,#2563EB)",padding:"7px 12px",display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:14}}>{icon}</span><span style={{fontSize:10,fontWeight:800,color:"#fff",textTransform:"uppercase",letterSpacing:"0.15em"}}>{title}</span></div><div style={{padding:"2px 12px 12px"}}>{children}</div></div>);}
        function SRow({label,value,accent}){return(<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"5px 0",borderBottom:"1px solid #F1F5F9",gap:8}}><span style={{fontSize:11,color:"#94A3B8",flexShrink:0,minWidth:116}}>{label}</span><span style={{fontSize:accent?15:12,color:accent?"#1E3A7A":"#1E293B",fontFamily:accent?"'JetBrains Mono',monospace":"inherit",fontWeight:accent?800:500,textAlign:"right"}}>{value}</span></div>);}

        /* --- MAIN APP --- */
        function App(){
          const [cfg,setCfg]=useState({tcType:"K",element:"S",junction:"UN",sheath:"316",diameter:6,length:300,head:"C",thermowell:"None",twMaterial:"316",connection:"NPT",fittingThread:'1/2"',insertionLen:150,cable:"D",cableLen:1.5,processTemp:""});
          const [tab,setTab]=useState("bom");
          const [dl,setDl]=useState(false);
          const set=(k,v)=>setCfg(p=>({...p,[k]:v}));
          const mc=deriveModel(cfg);
          const val=validate(cfg);
          const bom=makeBOM(cfg);
          const tc=CAT.tcTypes.find(t=>t.code===cfg.tcType);

          const handleDl=()=>{setDl(true);try{downloadDatasheet(cfg);}catch(e){console.error(e);}setTimeout(()=>setDl(false),1500);};

          return(
            <div style={{display:"flex",height:"100vh",overflow:"hidden",background:"#F0F4FA",fontFamily:"sans-serif",color:"#1E293B"}}>
              {/* Left Config Panel */}
              <div style={{width:274,background:"#F8FAFF",borderRight:"1.5px solid #E2E8F0",display:"flex",flexDirection:"column",flexShrink:0,overflowY:"auto",padding:"10px"}}>
                <div style={{padding:"14px",borderBottom:"1.5px solid #E2E8F0",background:"#fff",marginBottom:10,borderRadius:8}}>
                  <div style={{fontSize:17,fontWeight:800,color:"#1E3A7A"}}>TC Configurator</div>
                </div>
                <Box title="TC Element" icon="⚡">
                  <label style={LS.lbl}>TC Type</label>
                  <select style={LS.sel} value={cfg.tcType} onChange={e=>set("tcType",e.target.value)}>
                    {CAT.tcTypes.map(t=><option key={t.code} value={t.code}>Type {t.code}</option>)}
                  </select>
                  <label style={LS.lbl}>Sheath Material</label>
                  <select style={LS.sel} value={cfg.sheath} onChange={e=>set("sheath",e.target.value)}>
                    {CAT.sheaths.map(m=><option key={m.code} value={m.code}>{m.name}</option>)}
                  </select>
                </Box>
              </div>

              {/* Center 3D Panel */}
              <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
                <div style={{height:50,background:"#fff",borderBottom:"1.5px solid #E2E8F0",display:"flex",alignItems:"center",padding:"0 18px",gap:16}}>
                  <div style={{fontSize:22,fontWeight:800,color:"#1E3A7A"}}>{mc}</div>
                </div>
                <div style={{flex:1}}>
                  <Viewer3D cfg={cfg}/>
                </div>
              </div>

              {/* Right Panel */}
              <div style={{width:300,background:"#fff",borderLeft:"1.5px solid #E2E8F0",display:"flex",flexDirection:"column"}}>
                <div style={{padding:14,flex:1,overflowY:"auto"}}>
                   <button onClick={handleDl} disabled={dl} style={{width:"100%",padding:"11px 0",background:"#1E3A7A",color:"#fff",fontWeight:800,fontSize:12,border:"none",borderRadius:8,cursor:"pointer"}}>
                    {dl?"Downloading...":"📄 Download Datasheet"}
                  </button>
                  <div style={{marginTop:20}}>
                     {bom.map((r,i)=>(
                      <div key={i} style={{fontSize:11,padding:5,borderBottom:"1px solid #eee"}}>
                        <b>{r.item}</b>: {r.spec}
                      </div>
                     ))}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
