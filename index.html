<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tempsens | Industrial TC Configurator</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <style>
        body, html, #root { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #F3F4F6; font-family: 'Inter', -apple-system, sans-serif; }
        .sidebar { width: 320px; background: #FFFFFF; border-right: 1px solid #E5E7EB; display: flex; flexDirection: column; height: 100vh; flex-shrink: 0; }
        .header { background: #2D2D2D; padding: 20px; border-bottom: 4px solid #ffa600; }
        .config-area { padding: 15px; overflow-y: auto; flex: 1; }
        .section-title { font-size: 11px; font-weight: 800; color: #ffa600; text-transform: uppercase; letter-spacing: 1px; margin: 15px 0 10px; border-bottom: 1px solid #EEE; padding-bottom: 4px; }
        label { font-size: 10px; font-weight: 700; color: #64748B; text-transform: uppercase; display: block; margin-bottom: 4px; }
        select, input { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #D1D5DB; fontSize: 12px; margin-bottom: 12px; background: #fff; box-sizing: border-box; }
        .model-bar { padding: 15px 30px; background: #fff; border-bottom: 1px solid #E5E7EB; display: flex; justify-content: space-between; align-items: center; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #DDD; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const THREE = window.THREE;

        const CAT = {
            tcTypes: ["K", "J", "N", "T", "R", "S", "B"],
            elements: ["Simplex", "Duplex"],
            sheaths: ["SS 316", "SS 310", "Inconel-600", "Incoloy-800", "Ceramic (Ker-610)"],
            heads: ["Standard (Weatherproof)", "Ex-Proof (Flameproof)", "Miniature", "None"],
            connections: ["1/2\" NPT", "1/2\" BSP", "Adjustable Flange", "Fixed Flange", "Nipple-Union-Nipple"],
            thermowells: ["None", "Straight", "Tapered", "Stepped"],
            twMaterials: ["SS 316", "SS 310", "Hastelloy-C", "Monel"],
            cables: ["PVC", "Teflon", "Fiberglass", "SS Braided", "None"]
        };

        function App() {
            const [cfg, setCfg] = useState({
                tcType: "K", element: "Simplex", sheath: "SS 316", length: 300,
                head: "Standard (Weatherproof)", connection: "1/2\" NPT", 
                twType: "None", twMaterial: "SS 316", twLength: 250,
                cable: "None", cableLen: 2, processTemp: 450
            });

            const update = (k, v) => setCfg(p => ({ ...p, [k]: v }));

            return (
                <div style={{ display: "flex", height: "100vh" }}>
                    {/* SIDEBAR */}
                    <div className="sidebar">
                        <div className="header">
                            <div style={{ color: "#ffa600", fontWeight: "900", fontSize: "20px" }}>TEMPSENS</div>
                            <div style={{ color: "#FFFFFF", fontSize: "10px", opacity: 0.7 }}>PRECISION THERMAL ENGINEERING</div>
                        </div>
                        
                        <div className="config-area">
                            <div className="section-title">TC Element & Sheath</div>
                            <label>TC Type</label>
                            <select value={cfg.tcType} onChange={e => update("tcType", e.target.value)}>
                                {CAT.tcTypes.map(t => <option key={t} value={t}>Type {t}</option>)}
                            </select>

                            <label>Element</label>
                            <select value={cfg.element} onChange={e => update("element", e.target.value)}>
                                {CAT.elements.map(e => <option key={e} value={e}>{e}</option>)}
                            </select>

                            <label>Sheath Material</label>
                            <select value={cfg.sheath} onChange={e => update("sheath", e.target.value)}>
                                {CAT.sheaths.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>

                            <label>Immersion Length (L) mm</label>
                            <input type="number" value={cfg.length} onChange={e => update("length", e.target.value)} />

                            <div className="section-title">Process Connection</div>
                            <label>Head Type</label>
                            <select value={cfg.head} onChange={e => update("head", e.target.value)}>
                                {CAT.heads.map(h => <option key={h} value={h}>{h}</option>)}
                            </select>

                            <label>Thread / Flange</label>
                            <select value={cfg.connection} onChange={e => update("connection", e.target.value)}>
                                {CAT.connections.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>

                            <div className="section-title">Thermowell</div>
                            <label>Well Type</label>
                            <select value={cfg.twType} onChange={e => update("twType", e.target.value)}>
                                {CAT.thermowells.map(t => <option key={t} value={t}>{t}</option>)}
                            </select>

                            {cfg.twType !== "None" && (
                                <>
                                    <label>Well Material</label>
                                    <select value={cfg.twMaterial} onChange={e => update("twMaterial", e.target.value)}>
                                        {CAT.twMaterials.map(m => <option key={m} value={m}>{m}</option>)}
                                    </select>
                                    <label>Well Length (U) mm</label>
                                    <input type="number" value={cfg.twLength} onChange={e => update("twLength", e.target.value)} />
                                </>
                            )}

                            <div className="section-title">Extension & Data</div>
                            <label>Cable Type</label>
                            <select value={cfg.cable} onChange={e => update("cable", e.target.value)}>
                                {CAT.cables.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>

                            {cfg.cable !== "None" && (
                                <>
                                    <label>Cable Length (m)</label>
                                    <input type="number" value={cfg.cableLen} onChange={e => update("cableLen", e.target.value)} />
                                </>
                            )}

                            <label>Process Temperature (°C)</label>
                            <input type="number" value={cfg.processTemp} onChange={e => update("processTemp", e.target.value)} />
                        </div>
                    </div>

                    {/* MAIN VIEW */}
                    <div style={{ flex: 1, position: "relative", display: "flex", flexDirection: "column" }}>
                        <div className="model-bar">
                            <div>
                                <span style={{ color: "#64748B", fontSize: "11px", fontWeight: "700" }}>CURRENT CONFIGURATION</span>
                                <div style={{ fontSize: "22px", fontWeight: "800", color: "#2D2D2D" }}>
                                    T-{cfg.tcType}-{cfg.length}-{cfg.element[0]}
                                </div>
                            </div>
                            <div style={{textAlign: 'right'}}>
                                <div style={{fontSize: '11px', color: '#64748B'}}>OPERATING LIMIT</div>
                                <div style={{fontSize: '16px', fontWeight: '700', color: cfg.processTemp > 1000 ? '#EF4444' : '#10B981'}}>
                                    {cfg.processTemp}°C
                                </div>
                            </div>
                        </div>
                        <div id="canvas-container" style={{ flex: 1, background: "#F9FAFB" }}>
                            <Viewer3D cfg={cfg} />
                        </div>
                    </div>
                </div>
            );
        }

        function Viewer3D({ cfg }) {
            const mountRef = useRef(null);
            useEffect(() => {
                const w = mountRef.current.clientWidth, h = mountRef.current.clientHeight;
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0xF9FAFB);
                const camera = new THREE.PerspectiveCamera(40, w / h, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(w, h);
                mountRef.current.appendChild(renderer.domElement);

                scene.add(new THREE.AmbientLight(0xffffff, 0.8));
                const sun = new THREE.DirectionalLight(0xffffff, 1);
                sun.position.set(5, 10, 7);
                scene.add(sun);

                const group = new THREE.Group();
                scene.add(group);

                // Sheath
                const sMat = new THREE.MeshStandardMaterial({ color: 0xCBD5E1, metalness: 0.9, roughness: 0.1 });
                const sheath = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 8, 32), sMat);
                group.add(sheath);

                // Head
                if (cfg.head !== "None") {
                    const hMat = new THREE.MeshStandardMaterial({ color: 0x475569, metalness: 0.5 });
                    const head = new THREE.Mesh(new THREE.CylinderGeometry(1, 0.8, 1.5, 6), hMat);
                    head.position.y = 4.7;
                    group.add(head);
                }

                // Thermowell
                if (cfg.twType !== "None") {
                    const twMat = new THREE.MeshStandardMaterial({ color: 0x94A3B8, transparent: true, opacity: 0.6 });
                    const well = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.4, 6, 32), twMat);
                    well.position.y = -2;
                    group.add(well);
                }

                camera.position.set(8, 5, 12);
                camera.lookAt(0, 0, 0);

                const animate = () => {
                    requestAnimationFrame(animate);
                    group.rotation.y += 0.005;
                    renderer.render(scene, camera);
                };
                animate();

                return () => { if(mountRef.current) mountRef.current.removeChild(renderer.domElement); };
            }, [cfg]);

            return <div ref={mountRef} style={{ width: "100%", height: "100%" }} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
